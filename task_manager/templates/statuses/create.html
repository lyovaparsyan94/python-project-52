{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Создать статус" %}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>{% trans "Создать статус" %}</h2>

            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="{{ form.name.id_for_label }}" class="form-label">
                        {% trans "Имя" %}
                    </label>
                    {{ form.name }}
                    {% if form.name.help_text %}
                        <div class="form-text">{{ form.name.help_text }}</div>
                    {% endif %}
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">{% trans "Создать" %}</button>
                    <a href="{% url 'statuses:statuses' %}" class="btn btn-secondary">{% trans "Отмена" %}</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
