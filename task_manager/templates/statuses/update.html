{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Изменить статус" %}{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>{% trans "Изменить" %} «{{ object.name }}»</h2>

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label for="{{ form.name.id_for_label }}" class="form-label">
                {% trans "Имя" %}
            </label>
            {{ form.name }}
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">{% trans "Изменить" %}</button>
            <a href="{% url 'statuses:statuses' %}" class="btn btn-secondary">{% trans "Отмена" %}</a>
        </div>
    </form>
</div>
{% endblock %}
